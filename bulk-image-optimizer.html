<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Image Optimizer | Compress JPG & PNG Online | OnlinePDFPro</title>
    <meta name="description" content="Optimize 100+ images at once in your browser. Reduce file size without losing quality. No limits, no uploads, 100% private.">
    <link rel="stylesheet" href="css/style.css?v=7">
    <link rel="stylesheet" href="css/mobile-fix-v2.css">
    <link rel="stylesheet" href="css/tools-v2.css">
    
    <style>
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        .optimizer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .image-card {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            position: relative;
            transition: transform 0.2s;
        }
        .image-card:hover { transform: translateY(-3px); }
        .image-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .image-info { font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; }
        .savings-badge {
            background: #dcfce7;
            color: #166534;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 10px;
        }

        .settings-bar {
            background: var(--surface-1);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .quality-slider {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
        }
        input[type="range"] { width: 100%; }

        .bulk-actions {
            position: sticky;
            bottom: 20px;
            background: var(--surface-1);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            gap: 15px;
            justify-content: center;
            border: 1px solid var(--border);
            z-index: 100;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <img src="logo.jpg" alt="OnlinePDFPro" class="logo-icon" style="width:28px; height:28px; border-radius:6px;">
                <span class="logo-text">OnlinePDFPro</span>
            </a>
            <nav class="nav">
                <a href="tools.html" class="nav-link">All Tools</a>
                <a href="history.html" class="nav-link">History</a>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="container">
            <div class="tool-header" style="text-align:center; margin-top: 40px;">
                <h1 class="tool-title" style="font-size:2.5rem; font-weight:800;">Bulk Image Optimizer</h1>
                <p class="tool-description" style="color:var(--text-secondary);">Optimize 100+ images instantly. 100% private, 100% in-browser.</p>
            </div>

            <div class="upload-zone glass-card" id="dropArea" style="cursor:pointer; padding: 60px 20px; text-align: center; border: 2px dashed #cbd5e1; border-radius: 20px; margin-top: 30px;">
                <span style="font-size: 50px;">🖼️</span>
                <p style="font-size: 18px; font-weight: 700; margin: 15px 0;">Select or drag images (JPG, PNG, WebP)</p>
                <button class="btn btn-primary" style="padding: 12px 30px;">Select Images</button>
                <input type="file" id="fileInput" accept="image/*" multiple hidden>
            </div>

            <div id="optimizerWorkspace" style="display: none;">
                <div class="settings-bar">
                    <div class="quality-slider">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <label style="font-weight: 700;">Compression Level</label>
                            <span id="qualityVal" style="color: var(--accent); font-weight: 700;">80%</span>
                        </div>
                        <input type="range" id="qualityRange" min="10" max="100" value="80">
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">Total Savings</div>
                        <div id="totalSavings" style="font-size: 20px; font-weight: 800; color: #166534;">0 KB</div>
                    </div>
                </div>

                <div class="optimizer-grid" id="imageGrid"></div>
            </div>

            <div class="bulk-actions" id="bulkActions">
                <button class="btn btn-primary" id="downloadAllBtn" style="border-radius: 50px; padding: 12px 30px;">💾 Download Optimized Zip</button>
                <button class="btn btn-secondary" id="clearBtn" style="border-radius: 50px; padding: 12px 30px;">Clear All</button>
            </div>
        </div>
    </main>

    <script src="js/vendor/jszip/jszip.min.js"></script>
    <script>
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const workspace = document.getElementById('optimizerWorkspace');
        const imageGrid = document.getElementById('imageGrid');
        const bulkActions = document.getElementById('bulkActions');
        const qualityRange = document.getElementById('qualityRange');
        const qualityVal = document.getElementById('qualityVal');
        const totalSavingsEl = document.getElementById('totalSavings');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearBtn = document.getElementById('clearBtn');

        let originalFiles = [];
        let optimizedBlobs = [];

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        qualityRange.oninput = (e) => {
            qualityVal.textContent = e.target.value + '%';
            reOptimize();
        };

        async function handleFiles(files) {
            if (!files.length) return;
            originalFiles = Array.from(files);
            dropArea.style.display = 'none';
            workspace.style.display = 'block';
            bulkActions.style.display = 'flex';
            reOptimize();
        }

        async function reOptimize() {
            imageGrid.innerHTML = '';
            optimizedBlobs = [];
            let totalSaved = 0;
            const quality = qualityRange.value / 100;

            for (let i = 0; i < originalFiles.length; i++) {
                const file = originalFiles[i];
                const optimized = await optimizeImage(file, quality);
                optimizedBlobs.push({ blob: optimized.blob, name: file.name });
                
                const savings = file.size - optimized.blob.size;
                totalSaved += Math.max(0, savings);
                
                renderImageCard(file, optimized.blob, optimized.previewUrl, savings);
            }
            
            totalSavingsEl.textContent = formatBytes(totalSaved);
        }

        function optimizeImage(file, quality) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    canvas.toBlob((blob) => {
                        resolve({
                            blob: blob,
                            previewUrl: URL.createObjectURL(blob)
                        });
                    }, 'image/jpeg', quality);
                };
            });
        }

        function renderImageCard(orig, opt, preview, saved) {
            const pct = Math.round((saved / orig.size) * 100);
            const card = document.createElement('div');
            card.className = 'image-card fade-in';
            card.innerHTML = `
                <img src="${preview}">
                <div style="font-size: 12px; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${orig.name}</div>
                <div class="image-info">
                    ${formatBytes(orig.size)} → ${formatBytes(opt.size)}
                </div>
                ${pct > 0 ? `<span class="savings-badge">-${pct}%</span>` : ''}
            `;
            imageGrid.appendChild(card);
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        downloadAllBtn.onclick = async () => {
            const zip = new JSZip();
            optimizedBlobs.forEach(item => {
                zip.file(item.name.replace(/\.[^/.]+$/, "") + "_optimized.jpg", item.blob);
            });
            const content = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'optimized_images.zip';
            a.click();
            URL.revokeObjectURL(url);
        };

        clearBtn.onclick = () => {
            originalFiles = [];
            optimizedBlobs = [];
            imageGrid.innerHTML = '';
            workspace.style.display = 'none';
            bulkActions.style.display = 'none';
            dropArea.style.display = 'block';
            fileInput.value = '';
        };
    </script>
</body>
</html>
